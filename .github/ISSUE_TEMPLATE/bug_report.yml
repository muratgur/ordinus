name: Bug report
description: Report something that is broken or behaving unexpectedly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Ordinus. Please include enough detail for someone else to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the problem.
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS 15, Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Ordinus version or commit
      placeholder: 0.1.0 or commit SHA
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or attach screenshots. Remove secrets before sharing.
      render: shell
